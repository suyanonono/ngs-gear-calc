<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PSO2NGS ステータスシミュレーター</title>
<link rel="icon" href="favicon.png">
<meta property="og:title" content="PSO2NGS ステータスシミュレーター">
<meta property="og:description" content="武器・ユニット・能力の合計ステータスとダメージ期待値を計算します">
<meta property="og:type" content="website">
<meta property="og:url" content="https://suyanonono.github.io/ngs-gear-calc/">
<meta property="og:image" content="https://suyanonono.github.io/ngs-gear-calc/ogp.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{overflow-x:hidden;max-width:100%;background:#0f1117;color:#e2e8f0;font-family:sans-serif;font-size:14px;padding:.75rem;padding-bottom:60px;min-height:100vh}
.app-header{margin-bottom:1.25rem;padding-bottom:.75rem;border-bottom:1px solid #1e2535;display:flex;align-items:flex-start;justify-content:space-between;gap:8px;flex-wrap:wrap}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.app-title{font-size:16px;font-weight:500;color:#f1f5f9}
.app-sub{font-size:11px;color:#64748b;margin-top:2px}
.hdr-btns{display:flex;gap:6px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.hdr-btn{padding:5px 12px;border-radius:8px;border:1px solid #334155;background:#1e2535;color:#94a3b8;font-size:12px;cursor:pointer}
.slot-btn{padding:5px 12px;border-radius:8px;border:1px solid #334155;background:#1e2535;color:#94a3b8;font-size:12px;cursor:pointer}
.slot-btn.active{color:#a78bfa;border-color:#7c3aed66;background:#7c3aed22}
.tabs{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.tab-btn{padding:5px 12px;border-radius:8px;border:1px solid #1e2535;background:#151a25;color:#94a3b8;font-size:12px;cursor:pointer}
.tab-btn.active.weapon{background:#7c3aed22;border-color:#7c3aed66;color:#a78bfa}
.tab-btn.active.armor{background:#0369a122;border-color:#0369a166;color:#38bdf8}
.tab-btn.active.ring{background:#10b98122;border-color:#10b98166;color:#34d399}
.gear-panel{display:none}.gear-panel.active{display:block}
.gear-card{background:#151a25;border:1px solid #1e2535;border-radius:14px;padding:1rem;margin-bottom:1rem}
.gear-card.weapon-card{border-color:#7c3aed33}
.gear-card.armor-card{border-color:#0369a133}
.slabel{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:#475569;margin-bottom:6px}
.sel-wrap{margin-bottom:.75rem;padding-bottom:.75rem;border-bottom:1px solid #1e2535}
.sel-wrap label{font-size:10px;color:#64748b;display:block;margin-bottom:4px;font-weight:500;letter-spacing:.06em;text-transform:uppercase}
.sel-wrap select{width:100%;background:#0f1117;border:1px solid #7c3aed44;border-radius:10px;color:#a78bfa;font-size:13px;padding:8px 10px;outline:none}
.sel-wrap.armor-sel select{border-color:#0369a144;color:#38bdf8}
.sel-wrap.armor-sel label{color:#0369a188}
.stats-grid{display:grid;gap:6px;margin-bottom:.75rem}
.stat-box{background:#0f1117;border:1px solid #1e2535;border-radius:10px;padding:6px 8px;display:flex;flex-direction:column;gap:2px}
.stat-box label{font-size:9px;font-weight:500;letter-spacing:.06em}
.stat-box .iw{display:flex;align-items:center;gap:2px}
.stat-box input{background:transparent;border:none;outline:none;font-size:14px;font-weight:500;width:100%;padding:0;color:#f1f5f9}
.stat-box .unit{font-size:10px;color:#475569}
.affixes-wrap{border-top:1px solid #1e2535;padding-top:.75rem;margin-top:.5rem}
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%}
.affix-tbl{border-collapse:collapse;width:100%;min-width:660px;table-layout:fixed}
.affix-tbl.ex-tbl{min-width:720px}
.affix-tbl th{font-size:9px;color:#334155;font-weight:400;padding:2px 3px;text-align:center;white-space:nowrap}
.affix-tbl th:first-child{text-align:left}
.affix-tbl td{padding:2px 3px;vertical-align:middle}
.affix-tbl td input[type="number"]{width:100%;background:#0f1117;border:1px solid #1e2535;border-radius:6px;color:#94a3b8;font-size:11px;padding:4px 3px;outline:none;text-align:right}
.affix-tbl td input.col-s{color:#c97a50;background:#fb923c09}
.affix-tbl td input.col-r{color:#5a8ab8;background:#60a5fa09}
.affix-tbl td input.col-t{color:#b8a840;background:#fde04709}
.affix-tbl td input.col-hp{color:#3aa87e;background:#34d39909}
.affix-tbl td input.col-pp{color:#2aa8b8;background:#22d3ee09}
.affix-tbl td input.col-fl{color:#c07828;background:#f5953309}
.affix-tbl td input.col-dr{color:#2aa8b8;background:#22d3ee09}
.affix-tbl td input.col-td{color:#8870c8;background:#a78bfa09}
.affix-tbl td.cell-s{background:#fb923c06}.affix-tbl td.cell-r{background:#60a5fa06}
.affix-tbl td.cell-t{background:#fde04706}.affix-tbl td.cell-hp{background:#34d39906}
.affix-tbl td.cell-pp{background:#22d3ee06}.affix-tbl td.cell-fl{background:#f5953306}
.affix-tbl td.cell-dr{background:#22d3ee06}.affix-tbl td.cell-td{background:#a78bfa06}
.affix-tbl td.sub-cell select{width:100%;background:#0f1117;border:1px solid #e0508044;border-radius:6px;color:#e05080;font-size:11px;padding:4px 2px;outline:none}
.dd-wrap{position:relative}
.dd-btn{width:100%;background:#0f1117;border:1px solid #1e2535;border-radius:6px;color:#e2e8f0;font-size:11px;padding:4px 6px;text-align:left;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;outline:none}
.dd-btn.open{border-color:#475569}
.dd-panel{display:none;position:fixed;width:260px;background:#1e2535;border:1px solid #334155;border-radius:0 0 10px 10px;z-index:9999;max-height:480px;overflow:hidden;flex-direction:column}
.dd-panel.open{display:flex}
.dd-search{padding:5px 6px;border-bottom:1px solid #334155}
.dd-search input{width:100%;background:#0f1117;border:1px solid #334155;border-radius:6px;color:#e2e8f0;font-size:12px;padding:4px 6px;outline:none}
.dd-sort{display:flex;gap:3px;padding:4px 6px;border-bottom:1px solid #334155;flex-wrap:wrap}
.dd-sort button{padding:2px 6px;border-radius:4px;border:1px solid #334155;background:#0f1117;font-size:10px;cursor:pointer;color:#64748b}
.dd-sort button.active{border-color:currentColor;background:#ffffff18}
.dd-sort button.ss{color:#c97a50}.dd-sort button.sr{color:#5a8ab8}.dd-sort button.st{color:#b8a840}
.dd-sort button.shp{color:#3aa87e}.dd-sort button.spp{color:#2aa8b8}.dd-sort button.sfl{color:#c07828}
.sort-status{font-size:10px;color:#475569;padding:2px 8px 4px;min-height:14px;border-bottom:1px solid #1e2535}
.dd-list{overflow-y:auto;flex:1}
.dd-item{padding:5px 10px;font-size:12px;cursor:pointer;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dd-item:hover{background:#334155}
.dd-item.cat{color:#475569;font-size:10px;cursor:default;padding:3px 8px;background:#151a25}
.dd-item.subcat{font-size:10px;cursor:default;padding:3px 8px 3px 12px;display:flex;align-items:center;gap:6px;color:#64748b;margin-top:2px}
.dd-item.subcat::before{content:'';display:inline-block;width:3px;height:10px;border-radius:2px;flex-shrink:0}
.dd-item.none-item{color:#64748b}
.dd-item.disabled{color:#2a3547;cursor:default;pointer-events:none}
.dd-item.disabled:hover{background:transparent}
.ex-wrap{border-top:1px solid #e0508066;background:#e0508022;border-radius:10px;padding:.75rem;margin-top:.75rem}
.ex-label{font-size:10px;font-weight:500;letter-spacing:.07em;color:#e0508088;text-transform:uppercase}
.hint{font-size:10px;color:#475569;margin-bottom:5px}
.warn{display:none;font-size:11px;font-weight:500;color:#f87171;background:#f8717122;border:1px solid #f8717144;border-radius:6px;padding:3px 8px;margin-bottom:5px}
.result-card{background:#151a25;border:1px solid #1e2535;border-radius:14px;padding:1rem;margin-top:1rem}
.result-title{font-size:14px;font-weight:500;color:#f1f5f9;margin-bottom:.75rem}
.sp-box{border-radius:10px;padding:10px 12px;display:flex;align-items:center}
.sp-box.fl{background:#fb923c11;border:1px solid #fb923c33;justify-content:space-between;flex-wrap:wrap;gap:6px}
.sp-box.dr{background:#22d3ee11;border:1px solid #22d3ee33;justify-content:space-between;flex-wrap:wrap;gap:6px}
.sp-label{font-size:11px}
.sp-box.fl .sp-label{color:#fb923c88}
.sp-box.dr .sp-label{color:#22d3ee88}
.sp-sub{font-size:10px;color:#64748b;margin-top:2px}
.sp-val{font-size:18px;font-weight:500;text-align:right}
.sp-box.fl .sp-val{color:#fb923c}
.sp-box.dr .sp-val{color:#22d3ee}
.sp-unit{font-size:12px;margin-left:2px;opacity:.5}
.ref-card{background:#151a25;border:1px solid #334155;border-radius:14px;padding:1rem;margin-top:8px}
.ref-title{font-size:13px;font-weight:500;color:#64748b;margin-bottom:4px}
.ref-note{font-size:11px;color:#334155;margin-bottom:8px}
.ex-tooltip{position:fixed;z-index:99999;width:260px;background:#1a0f1f;border:1px solid #e0508066;border-radius:10px;padding:12px;pointer-events:none;display:none;box-shadow:0 4px 24px #00000088;box-sizing:border-box}
.ex-tooltip .tt-name{font-size:13px;font-weight:700;margin-bottom:8px}
.ex-tooltip .tt-stats{margin-bottom:8px}
.ex-tooltip .tt-body{font-size:12px;color:#cbd5e1;line-height:1.75;border-top:1px solid #ffffff22;padding-top:8px}
.ex-tooltip .tt-body.no-border{border-top:none;padding-top:0}
@media(max-width:600px){
  .hdr-btns{gap:4px}
  .result-atk-grid{grid-template-columns:1fr!important}
  .result-sub-grid{grid-template-columns:1fr!important}
  .crit-row{flex-direction:column;align-items:flex-start!important}
  .crit-row .crit-gear{padding-left:0!important;border-left:none!important;margin-top:4px}
  .crit-row .crit-subsl{padding-left:0!important;border-left:none!important}
  .crit-row .crit-pct{margin-left:0!important;margin-top:4px}
  .sp-sub-note{display:none!important}
}
.dd-modal-overlay{display:none;position:fixed;inset:0;background:#00000088;z-index:99990;align-items:flex-end}
.dd-modal-overlay.open{display:flex}
.dd-modal{background:#1e2535;border-radius:16px 16px 0 0;width:100%;max-height:80vh;display:flex;flex-direction:column;overflow:hidden}
.dd-modal-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 8px;border-bottom:1px solid #334155}
.dd-modal-title{font-size:13px;font-weight:500;color:#e2e8f0}
.dd-modal-close{background:none;border:none;color:#64748b;font-size:18px;cursor:pointer;padding:0 4px;line-height:1}
</style>
</head>
<body>
<button id="back_top" onclick="window.scrollTo({top:0,behavior:'smooth'})" style="display:none;position:fixed;bottom:20px;right:20px;z-index:9998;padding:8px 12px;border-radius:10px;border:1px solid #334155;background:#1e2535;color:#94a3b8;font-size:12px;cursor:pointer;box-shadow:0 2px 12px #00000066">▲ トップへ</button>
<div id="dd_modal_overlay" class="dd-modal-overlay" onclick="onModalOverlayClick(event)">
  <div class="dd-modal">
    <div class="dd-modal-header">
      <span class="dd-modal-title" id="dd_modal_title">能力を選択</span>
      <button class="dd-modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="dd-search" style="padding:8px 10px;border-bottom:1px solid #334155">
      <input id="dd_modal_srch" placeholder="検索..." oninput="filtModalDD()" autocomplete="off" style="width:100%;background:#0f1117;border:1px solid #334155;border-radius:6px;color:#e2e8f0;font-size:14px;padding:6px 8px;outline:none">
    </div>
    <div id="dd_modal_sort" class="dd-sort" style="padding:6px 10px;border-bottom:1px solid #334155;flex-wrap:wrap"></div>
    <div class="sort-status" id="dd_modal_sort_status"></div>
    <div id="dd_modal_list" class="dd-list" style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch"></div>
  </div>
</div>
<div id="ex_tooltip" class="ex-tooltip">
  <div class="tt-name" id="tt_name"></div>
  <div class="tt-stats" id="tt_stats"></div>
  <div class="tt-body" id="tt_body"></div>
</div>
<div class="app-header">
  <div>
    <div class="app-title">PSO2NGS ステータスシミュレーター</div>
    <div class="app-sub">スロット1〜3で構成を切替 / 保存・読込で記録 / コピーで他スロットに複製</div>
  </div>
  <div class="hdr-right">
    <div class="hdr-btns">
      <button id="slot_btn_0" class="slot-btn active" onclick="selectSlot(0)">1</button>
      <button id="slot_btn_1" class="slot-btn" onclick="selectSlot(1)">2</button>
      <button id="slot_btn_2" class="slot-btn" onclick="selectSlot(2)">3</button>
      <button class="hdr-btn" onclick="doSave()">保存</button>
      <button class="hdr-btn" onclick="doLoad()">読込</button>
      <div style="position:relative;display:inline-block">
        <button class="hdr-btn" id="copy_btn" onclick="togCopyMenu()">コピー▾</button>
        <div id="copy_menu" style="display:none;position:absolute;top:100%;left:0;margin-top:4px;background:#1e2535;border:1px solid #334155;border-radius:8px;z-index:9999;min-width:140px;overflow:hidden;box-shadow:0 4px 16px #00000066">
          <div style="font-size:10px;color:#475569;padding:6px 12px 4px;border-bottom:1px solid #1e2535">コピー先を選択</div>
          <div id="copy_menu_items"></div>
        </div>
      </div>
      <button class="hdr-btn" onclick="resetState()" style="color:#f87171;border-color:#f8717144">初期化</button>
    </div>
    <span id="save_msg" style="font-size:11px;color:#64748b;display:block;height:16px;line-height:16px"></span>
  </div>
</div>
<div id="load_status" style="display:none;padding:2rem;text-align:center;color:#64748b;font-size:13px">データを読み込み中...</div>
<div class="tabs" id="tabs"></div>
<div id="panels"></div>
<div id="result"></div>

<script>
var togSlState=false,togGearState=0,togSubSlState=false,togExCond=false,togRingCond=false;
var showSlotCompare=false;
var _lastTot={s:1,r:1,t:1};
var _exCondMul=1,_ringCondMul=1;

// ==================== localStorage wrapper ====================
var storage={
  set:function(k,v){try{localStorage.setItem(k,v);return true;}catch(e){return false;}},
  get:function(k){try{return localStorage.getItem(k);}catch(e){return null;}},
};

// ==================== 外部データ(JSONから読込) ====================
var WEAPONS=[];
var ARMORS=[];
var RING_TYPE1=[];
var RING_TYPE2=[];
var PRESETS=[];
var EX_PRESETS=[];
var WEAPON_TYPES=[];
var EX_SUB=[
  {n:"—",hp:0,pp:0,dr:0,td:0},{n:"H",hp:25,pp:0,dr:0,td:0},{n:"P",hp:0,pp:3,dr:0,td:0},
  {n:"X",hp:15,pp:2,dr:0,td:0},{n:"D",hp:0,pp:0,dr:1,td:0},{n:"R",hp:0,pp:0,dr:0,td:5}
];
var FIXAS=[
  {n:"（なし）",rows:[]},
  {n:"フィクサ・アタック",rows:[{label:"威力+",vals:[8,9,9.5,9.75,10]}]},
  {n:"フィクサ・テルミナ",rows:[{label:"クリティカル時の威力+",vals:[20,23,26,28,29]}]},
  {n:"フィクサ・フェタル",rows:[{label:"クリティカル発生率+",vals:[20,23,25,27,28]}],critBonus:[20,23,25,27,28]},
  {n:"フィクサ・ウィクス",rows:[{label:"威力+",vals:[2,2,2,2,2]},{label:"弱点部位への威力+",vals:[8,9,10,11,12],isCond:true}]},
  {n:"フィクサ・アンウィクス",rows:[{label:"威力+",vals:[2,2,2,2,2]},{label:"非弱点部位への威力+",vals:[5,8,11,13,15],isCond:true}]},
  {n:"フィクサ・ブラストル",rows:[{label:"威力+",vals:[7,8,8.5,8.75,9]},{label:"PB威力+",vals:[3,6,9,11,12]}]},
  {n:"フィクサ・アバンダク",rows:[{label:"威力+",vals:[2,2,2,2,2]},{label:"_abandak",vals:[0.125,0.25,0.375,0.45,0.5],isCond:true}]}
];
var GEAR=[
  {id:"weapon",label:"武器",isWeapon:true},
  {id:"armor1",label:"ユニット①",isWeapon:false},
  {id:"armor2",label:"ユニット②",isWeapon:false},
  {id:"armor3",label:"ユニット③",isWeapon:false},
  {id:"ring",label:"リング",isWeapon:false,isRing:true}
];
var ALL_STATS=[{k:"s",label:"打撃"},{k:"r",label:"射撃"},{k:"t",label:"法撃"},{k:"hp",label:"HP"},{k:"pp",label:"PP"},{k:"fl",label:"下限補正"},{k:"dr",label:"ダメージ耐性"},{k:"td",label:"全ダウン耐性"}];
var WEAPON_BASE=[];
var ARMOR_BASE=[{k:"s",label:"打撃"},{k:"r",label:"射撃"},{k:"t",label:"法撃"},{k:"hp",label:"HP"},{k:"pp",label:"PP"},{k:"dr",label:"ダメージ耐性"}];
var sColors={s:"#fb923c",r:"#60a5fa",t:"#fde047",hp:"#34d399",pp:"#22d3ee"};
var KEY_NAMES={'s':'打撃','r':'射撃','t':'法撃','hp':'HP','pp':'PP','fl':'下限','dr':'耐性','pow':'火力'};
var KEY_COLORS={'s':'#c97a50','r':'#5a8ab8','t':'#b8a840','hp':'#3aa87e','pp':'#2aa8b8','fl':'#c07828','dr':'#2aa8b8'};
var STAT_DEFS=[
  {k:'s',label:'打撃',color:'#c97a50',bg:'#fb923c22',max:10},
  {k:'r',label:'射撃',color:'#5a8ab8',bg:'#60a5fa22',max:10},
  {k:'t',label:'法撃',color:'#b8a840',bg:'#fde04722',max:10},
  {k:'hp',label:'HP',color:'#3aa87e',bg:'#34d39922',max:100},
  {k:'pp',label:'PP',color:'#2aa8b8',bg:'#22d3ee22',max:25},
  {k:'fl',label:'下限補正',color:'#c07828',bg:'#f5953322',max:10},
  {k:'dr',label:'耐性',color:'#2aa8b8',bg:'#22d3ee22',max:5},
  {k:'td',label:'全ダウン耐',color:'#8870c8',bg:'#a78bfa22',max:20}
];
var SUFFIX_GROUPS=['ドミナ'];

// ==================== ツールチップ ====================
var _ttEl,_ttName,_ttStats,_ttBody;
function initTT(){_ttEl=document.getElementById('ex_tooltip');_ttName=document.getElementById('tt_name');_ttStats=document.getElementById('tt_stats');_ttBody=document.getElementById('tt_body');}
var TT_W_SINGLE=280,TT_W_COMPARE=500,TT_METER_CELLS=10;
function buildMeter(v,max,color){
  var filled=Math.round((Math.min(Math.max(v,0),max)/max)*TT_METER_CELLS),html='';
  for(var i=0;i<TT_METER_CELLS;i++){var on=i<filled;html+='<span style="display:inline-block;width:10px;height:10px;border-radius:1px;flex-shrink:0;background:'+(on?color:color+'33')+';border:1px solid '+(on?color:color+'22')+'"></span>';}
  return html;
}
function statCard(sd,v,highlight){
  var unit=(sd.k==='hp'||sd.k==='pp'||sd.k==='td')?'':'%',prefix=v>0?'+':'';
  return '<div style="display:flex;align-items:center;gap:4px;padding:3px 7px;border-radius:5px;background:'+sd.bg+';border:1px solid '+sd.color+(highlight?'55':'22')+';opacity:'+(highlight?1:0.65)+';margin-bottom:4px">'
    +'<span style="flex-shrink:0;width:46px;font-size:10px;font-weight:700;color:'+sd.color+'">'+sd.label+'</span>'
    +'<span style="display:flex;gap:1px;flex:1;min-width:0">'+(v>0?buildMeter(v,sd.max,sd.color):'')+'</span>'
    +'<span style="flex-shrink:0;width:40px;font-size:11px;font-weight:700;color:'+(v<0?'#f87171':sd.color)+';text-align:right">'+prefix+v+unit+'</span></div>';
}
function showTT(e,preset,isEx,pid){
  if(!_ttEl)initTT();
  if(!preset||preset.n==='（なし）'||preset.cat||preset.subcat)return;
  var nameColor=isEx?'#e05080':'#a78bfa';
  _ttEl.style.borderColor=isEx?'#e0508066':'#7c3aed66';
  _ttEl.style.background=isEx?'#1a0f1f':'#110f1a';
  var curName=pid?getN(pid):'';
  var list=isEx?EX_PRESETS:PRESETS;
  var curPreset=(curName&&curName!=='（なし）')?list.find(function(x){return x.n===curName;}):null;
  var hasCompare=!!(curPreset&&!curPreset.cat&&!curPreset.subcat&&curPreset.n!==preset.n);
  if(hasCompare){
    _ttEl.style.width=TT_W_COMPARE+'px';_ttName.textContent='';

function computeIndexFromState(st){
  try{
    var wpn=WEAPONS[parseInt(st.ws||0)]||WEAPONS[0];if(!wpn.atk)return null;
    var wt=WEAPON_TYPES[parseInt(st.wts||0)]||WEAPON_TYPES[0];
    var s=1,r=1,t=1;
    GEAR.filter(function(g){return !g.isRing;}).forEach(function(g){
      var bs=1,br=1,bt=1;
      if(!g.isWeapon){var a=ARMORS[parseInt(st[g.id+'s']||0)]||ARMORS[0];bs=1+(a.s||0)/100;br=1+(a.r||0)/100;bt=1+(a.t||0)/100;}
      for(var i=0;i<8;i++){
        var pid=g.id+'_af'+i,nm=st.af&&st.af[pid],p=nm?PRESETS.find(function(x){return x.n===nm;}):null;
        if(p&&!p.cat&&!p.subcat){bs*=(1+(p.s||0)/100);br*=(1+(p.r||0)/100);bt*=(1+(p.t||0)/100);}
        else{bs*=(1+parseFloat((st.bi&&st.bi[pid+'_s'])||0)/100);br*=(1+parseFloat((st.bi&&st.bi[pid+'_r'])||0)/100);bt*=(1+parseFloat((st.bi&&st.bi[pid+'_t'])||0)/100);}
      }
      if(g.isWeapon){for(var j=0;j<3;j++){
        var epid='weapon_ex'+j,enm=st.af&&st.af[epid],ep=enm?EX_PRESETS.find(function(x){return x.n===enm;}):null;
        if(ep&&!ep.cat){bs*=(1+(ep.s||0)/100);br*=(1+(ep.r||0)/100);bt*=(1+(ep.t||0)/100);}
        else{bs*=(1+parseFloat((st.bi&&st.bi[epid+'_s'])||0)/100);br*=(1+parseFloat((st.bi&&st.bi[epid+'_r'])||0)/100);bt*=(1+parseFloat((st.bi&&st.bi[epid+'_t'])||0)/100);}
      }}
      s*=bs;r*=br;t*=bt;
    });
    var powMul=wt.atk==='s'?s:wt.atk==='r'?r:wt.atk==='t'?t:wt.atk==='sr'?Math.max(s,r):wt.atk==='st'?Math.max(s,t):(s+r+t)/3;
    var latentMul=1+(wpn.latentPow||0)/100;
    var fixaIdx=parseInt(st.fixa||0),fixaLv=parseInt(st.fixalv||0),fixa=FIXAS[fixaIdx]||FIXAS[0];
    var fixaPow=0;
    if(fixa.rows)fixa.rows.forEach(function(row){
      if(row.label==='PB威力+'||row.label==='クリティカル発生率+'||row.label==='クリティカル時の威力+')return;
      var isWA=fixa.n==='フィクサ・ウィクス'||fixa.n==='フィクサ・アンウィクス';
      if(row.isCond&&!isWA&&row.label!=='_abandak')return;
      if(row.label==='_abandak'){fixaPow+=Math.round(10*(row.vals[fixaLv]||0)*1000)/1000;return;}
      fixaPow+=row.vals[fixaLv]||0;
    });
    var fixaMul=1+fixaPow/100;
    var t1=RING_TYPE1[parseInt(st.rt1||0)]||RING_TYPE1[0],t1lv=parseInt(st.rt1lv||0);
    var ringPow=(t1.pow&&t1.pow.length)?(t1.pow[Math.min(t1lv,t1.pow.length-1)]||[0,0])[0]||0:0;
    var ringMul=1+ringPow/100;
    var totalPowMul=powMul*latentMul*fixaMul*ringMul;
    var flBase=wpn.fl||0,flMul=1;
    GEAR.filter(function(g){return !g.isRing;}).forEach(function(g){
      for(var i=0;i<8;i++){var pid=g.id+'_af'+i,nm=st.af&&st.af[pid],p=nm?PRESETS.find(function(x){return x.n===nm;}):null;flMul*=(1+(p&&!p.cat?p.fl||0:parseFloat((st.bi&&st.bi[pid+'_fl'])||0))/100);}
      if(g.isWeapon)for(var j=0;j<3;j++){var epid='weapon_ex'+j,enm=st.af&&st.af[epid],ep=enm?EX_PRESETS.find(function(x){return x.n===enm;}):null;flMul*=(1+(ep&&!ep.cat?ep.fl||0:parseFloat((st.bi&&st.bi[epid+'_fl'])||0))/100);}
    });
    var flFin=Math.min(flBase*flMul,100)/100;
    var critRate=15+(wpn.critBonus||0);
    if(fixa.critBonus)critRate+=fixa.critBonus[fixaLv]||0;
    if(togSlState)critRate+=10;critRate+=togGearState*2;if(togSubSlState)critRate+=5;
    critRate=Math.min(critRate,100)/100;
    var critPowBonus=fixa.n==='フィクサ・テルミナ'&&fixa.rows&&fixa.rows[0]?(fixa.rows[0].vals[fixaLv]||0)/100:0;
    var critMul=1.2*(1+critPowBonus);
    var adjCoef=(1-critRate)*(flFin+1)/2+critRate*critMul;
    return Math.round(wpn.atk*totalPowMul*adjCoef);
  }catch(e){return null;}
}

// 接頭辞(ロイス/アトス/エルガ/テルフィア/テラ/ペタ...)と派生表記(S/LC/MN)を
// まとめて取り除き、系統を一意に表す「基準キー」に変換する。
// 例: "テラドライエル" "ペタドライエル LC" → どちらも "ドライエル"
function normalizeOpName(n){
  if(!n||n==='（なし）')return null;
  var body=n;
  for(var i=0;i<OP_PREFIXES.length;i++){if(body.startsWith(OP_PREFIXES[i])){body=body.slice(OP_PREFIXES[i].length);break;}}
  if(body.endsWith(' LC'))body=body.slice(0,-3);
  else if(body.endsWith(' MN'))body=body.slice(0,-3);
  else if(body.endsWith(' S'))body=body.slice(0,-2);
  return body;
}
function getUsedInGear(gid,excludePid){
  var used={names:[],baseKeys:[],exSeries:[],suffixBases:[]};
  function addName(n){
    if(!n||n==='（なし）')return;
    used.names.push(n);
    used.baseKeys.push(normalizeOpName(n));
    if(n.startsWith('ユーゼ・'))used.exSeries.push('ユーゼ');
    if(n.startsWith('ユディ・'))used.exSeries.push('ユディ');
    var base=n.endsWith(' LC')?n.slice(0,-3):n.endsWith(' MN')?n.slice(0,-3):n;
    SUFFIX_GROUPS.forEach(function(sfx){if(base.endsWith(sfx)||base.endsWith('・'+sfx))used.suffixBases.push(base);});
  }
  for(var i=0;i<8;i++){var p=gid+'_af'+i;if(p!==excludePid)addName(getN(p));}
  if(gid==='weapon'){for(var j=0;j<3;j++){var p2='weapon_ex'+j;if(p2!==excludePid)addName(getN(p2));}}
  return used;
}
function isDisabled(p,used,isEx){
  if(!p||p.cat||p.subcat||p.n==='（なし）')return false;
  if(used.names.indexOf(p.n)!==-1)return true;
  var key=normalizeOpName(p.n);
  if(key!==null&&used.baseKeys.indexOf(key)!==-1)return true;
  if(!isEx){if(p.n.startsWith('ユーゼ・')&&used.exSeries.indexOf('ユーゼ')!==-1)return true;if(p.n.startsWith('ユディ・')&&used.exSeries.indexOf('ユディ')!==-1)return true;}
  var pbase=p.n.endsWith(' LC')?p.n.slice(0,-3):p.n.endsWith(' MN')?p.n.slice(0,-3):p.n,psfx='';
  SUFFIX_GROUPS.forEach(function(sfx){if(pbase.endsWith(sfx)||pbase.endsWith('・'+sfx))psfx=sfx;});
  if(psfx){for(var bi=0;bi<used.suffixBases.length;bi++){var sb=used.suffixBases[bi];if(sb.endsWith(psfx)||sb.endsWith('・'+psfx))return true;}}
  return false;
}
function renderItems(pid,list,q){
  var sortKeys=getSortKeys(pid),lq=(q||'').toLowerCase(),gid=getGid(pid),isEx=pid.indexOf('_ex')!==-1,used=getUsedInGear(gid,pid);
  var items=list.map(function(p,i){return{p:p,i:i};});
  if(sortKeys.length){
    var normals=items.filter(function(x){return !x.p.cat&&!x.p.subcat;});
    normals.sort(function(a,b){
      if(sortKeys[0]==='pow')return((b.p.s||0)+(b.p.r||0)+(b.p.t||0)+(b.p.fl||0))-((a.p.s||0)+(a.p.r||0)+(a.p.t||0)+(a.p.fl||0));
      for(var ki=0;ki<sortKeys.length;ki++){var diff=(b.p[sortKeys[ki]]||0)-(a.p[sortKeys[ki]]||0);if(diff!==0)return diff;}return 0;
    });items=normals;
  }
  var html='';
  items.forEach(function(x){
    var p=x.p,i=x.i;
    if(p.cat){if(!q&&!sortKeys.length)html+='<div class="dd-item cat">'+p.n+'</div>';return;}
    if(p.subcat){if(!q&&!sortKeys.length)html+='<div class="dd-item subcat"><span style="background:'+(p.color||'#475569')+'"></span>'+p.n+'</div>';return;}
    if(q&&!p.n.toLowerCase().includes(lq))return;
    var disabled=isDisabled(p,used,isEx),sub='';
    if(sortKeys.length&&p.n!=='（なし）'){
      var parts;
      if(sortKeys[0]==='pow'){var score=(p.s||0)+(p.r||0)+(p.t||0)+(p.fl||0);parts='<span style="color:'+(disabled?'#2a3547':'#f1a030')+';font-size:12px">火力スコア '+score+'</span>';}
      else{parts=sortKeys.map(function(k){return'<span style="color:'+(disabled?'#2a3547':(KEY_COLORS[k]||'#475569'))+';font-size:12px">'+KEY_NAMES[k]+' <b>'+(p[k]||0)+'</b></span>';}).join('<span style="color:#334155;margin:0 3px">/</span>');}
      sub='<div style="margin-top:2px">'+parts+'</div>';
    }
    var ttAttr=(!disabled&&p.n!=='（なし）')?' data-pidx="'+i+'" data-isex="'+isEx+'" data-pid="'+pid+'"':'';
    html+='<div class="dd-item'+(p.n==='（なし）'?' none-item':disabled?' disabled':sub?' has-sub':'')+'"'+ttAttr+' onclick="selDD(\''+pid+'\','+i+')" style="'+(sub?'padding:4px 10px;white-space:normal':'')+'">'+p.n+sub+'</div>';
  });
  return html||'<div class="dd-item none-item">該当なし</div>';
}

// ==================== 重複チェック ====================
// 接頭辞を新規追加する場合はここ(OP_PREFIXES)を書き換えるだけでよい。
// normalizeOpName/getUsedInGear/isDisabled/baseOPが全てこの配列を参照する。
var OP_PREFIXES=['ロイス','アトス','エルガ','テルフィア','テラ','ペタ'];
var EXG=[{label:'ユーゼ系',test:function(n){return n.startsWith('ユーゼ・');}},{label:'ユディ系',test:function(n){return n.startsWith('ユディ・');}}];
function baseOP(n){if(!n||n==='（なし）')return null;for(var i=0;i<OP_PREFIXES.length;i++)if(n.startsWith(OP_PREFIXES[i]))return n.slice(OP_PREFIXES[i].length);return null;}
function getNames(gid){var names=[];for(var i=0;i<8;i++){var n=getN(gid+'_af'+i);if(n&&n!=='（なし）')names.push(n);}if(gid==='weapon'){for(var j=0;j<3;j++){var m=getN('weapon_ex'+j);if(m&&m!=='（なし）')names.push(m);}}return names;}
function uniq(arr){return arr.filter(function(v,i,a){return a.indexOf(v)===i;});}
function updDupe(gid){
  var names=getNames(gid),warns=[],bases=names.map(baseOP).filter(Boolean),dups=bases.filter(function(b,i){return bases.indexOf(b)!==i;});
  if(dups.length)warns.push('同系統の能力が重複しています：'+uniq(dups).join('、'));
  EXG.forEach(function(g){var m=names.filter(function(n){return g.test(n);});if(m.length>1)warns.push(g.label+'は1箇所につき1個までです（現在'+m.length+'個）');});
  var el=document.getElementById('dupe_warn_'+gid);if(el){if(warns.length){el.style.display='block';el.innerHTML=warns.join('<br>');}else el.style.display='none';}
}
function updExDupe(){
  var names=[];for(var i=0;i<3;i++){var n=getN('weapon_ex'+i);if(n&&n!=='（なし）')names.push(n);}
  var bases=names.map(function(n){return n?n.replace(/[ⅢA]$/,'').trim():null;}).filter(Boolean),dups=uniq(bases.filter(function(b,i){return bases.indexOf(b)!==i;}));
  var el=document.getElementById('ex_dupe_warn');if(el){if(dups.length){el.style.display='block';el.textContent='同名のEX能力が重複しています：'+dups.join('、');}else el.style.display='none';}
}
function cntAct(pre,cnt){var n=0;for(var i=0;i<cnt;i++){var nm=getN(pre+i);if(nm&&nm!=='（なし）')n++;}return n;}
function chkLim(){
  var over=(cntAct('weapon_af',8)+cntAct('weapon_ex',3))>8;
  var w=document.getElementById('affix_warn');if(w)w.style.display=over?'block':'none';

}

function gv(id){var el=document.getElementById(id);return el?parseFloat(el.value)||0:0;}

  var el=document.getElementById('weapon_fl');if(el)el.value=w.fl||0;

function copyAff(from,to){
  for(var i=0;i<8;i++){
    var fp=from+'_af'+i,tp=to+'_af'+i,fb=document.getElementById(fp+'_btn'),tb=document.getElementById(tp+'_btn');
    if(fb&&tb)tb.textContent=fb.textContent;
    ALL_STATS.forEach(function(st){var fe=document.getElementById(fp+'_'+st.k),te=document.getElementById(tp+'_'+st.k);if(fe&&te)te.value=fe.value;});
  }
  updDupe(to);calc();
  document.querySelectorAll('.tab-btn').forEach(function(b){if(b.textContent===GEAR.find(function(g){return g.id===to;}).label)b.click();});
}
function calcGear(g){
  var res={};
  ['s','r','t'].forEach(function(k){
    var m=!g.isWeapon?(1+gv(g.id+'_'+k)/100):1;
    for(var i=0;i<8;i++)m*=(1+gv(g.id+'_af'+i+'_'+k)/100);
    if(g.isWeapon)for(var j=0;j<3;j++)m*=(1+gv(g.id+'_ex'+j+'_'+k)/100);
    res[k]=m;
  });
  ['hp','pp'].forEach(function(k){
    var s=!g.isWeapon?gv(g.id+'_'+k):0;
    for(var i=0;i<8;i++)s+=gv(g.id+'_af'+i+'_'+k);
    if(g.isWeapon)for(var j=0;j<3;j++)s+=gv(g.id+'_ex'+j+'_'+k);
    res[k]=s;
  });
  var fl=g.isWeapon?(1+gv('weapon_fl')/100):1;
  for(var i=0;i<8;i++)fl*=(1+gv(g.id+'_af'+i+'_fl')/100);
  if(g.isWeapon)for(var j=0;j<3;j++)fl*=(1+gv(g.id+'_ex'+j+'_fl')/100);
  res.fl=fl;
  var dr=!g.isWeapon?(1-gv(g.id+'_dr')/100):1;
  for(var i=0;i<8;i++){var v=gv(g.id+'_af'+i+'_dr');if(v>0)dr*=(1-v/100);}
  if(g.isWeapon)for(var j=0;j<3;j++){var v2=gv(g.id+'_ex'+j+'_dr');if(v2>0)dr*=(1-v2/100);}
  res.dr=dr;
  var td=1;
  for(var i=0;i<8;i++){var v3=gv(g.id+'_af'+i+'_td');if(v3>0)td*=(1-v3/100);}
  if(g.isWeapon)for(var j=0;j<3;j++){var v4=gv(g.id+'_ex'+j+'_td');if(v4>0)td*=(1-v4/100);}
  res.td=td;
  return res;
}
function fmtM(m){return m.toFixed(4);}
function countUniqueAffixes(){
  var names=new Set();
  GEAR.filter(function(g){return !g.isRing;}).forEach(function(g){
    for(var i=0;i<8;i++){var n=getN(g.id+'_af'+i);if(n&&n!=='（なし）')names.add(n);}
    if(g.isWeapon){for(var j=0;j<3;j++){var m=getN('weapon_ex'+j);if(m&&m!=='（なし）')names.add(m);}}
  });

}

        +'<div class="ref-theory-op" style="font-size:20px;color:#334155;padding-bottom:14px">=</div>'
        +'<div style="text-align:center;background:#f59e0b22;border:1px solid #f59e0b66;border-radius:8px;padding:4px 14px"><div style="font-size:26px;font-weight:700;color:#f59e0b">+'+((maxMulF-1)*100).toFixed(2)+'<span style="font-size:14px">%</span></div><div style="font-size:10px;color:#f59e0b88;margin-top:2px">最大（プリセット単体）</div></div>'
        +'</div><div style="font-size:10px;color:#475569;margin-top:6px;text-align:center">全装備合算時の最大：+'+((baseAvgF*maxMulF-1)*100).toFixed(2)+'%</div></div>';
      fixaLines.push({name:'',eff:fixaTheoryHTML,highlight:false,isTitle:false,raw:true});
    }
    html+=makeInfoCard('プリセット能力','#f59e0b',fixaLines);
  }
  var t1El=document.getElementById('ring_t1'),t2El=document.getElementById('ring_t2');
  var t1LvEl=document.getElementById('ring_t1_lv'),t2LvEl=document.getElementById('ring_t2_lv');
  var t1idx2=t1El?parseInt(t1El.value)||0:0,t2idx=t2El?parseInt(t2El.value)||0:0;
  var t1lv2=t1LvEl?parseInt(t1LvEl.value)||0:0,t2lv=t2LvEl?parseInt(t2LvEl.value)||0:0;
  var t1b=RING_TYPE1[t1idx2]||RING_TYPE1[0],t2=RING_TYPE2[t2idx]||RING_TYPE2[0];
  function getEff(r,lv){if(!r||!r.eff)return '';return Array.isArray(r.eff)?(r.eff[lv]||r.eff[r.eff.length-1]):r.eff;}
  var t1eff=getEff(t1b,t1lv2),t2eff=Array.isArray(t2.eff)?(t2.eff[t2lv]||t2.eff[t2.eff.length-1]):t2.eff;
  var t1pow=(t1b.pow&&Array.isArray(t1b.pow))?t1b.pow[Math.min(t1lv2,t1b.pow.length-1)]:null;
  var ringLines=[];
  if(t1eff)ringLines.push({name:t1b.n+' +'+t1lv2,eff:t1eff.split('／').map(function(s){return s.trim();}).filter(Boolean).join('<br>'),highlight:false,isTitle:true});
  if(t2eff)ringLines.push({name:t2.n+' +'+t2lv,eff:t2eff.split('／').map(function(s){return s.trim();}).filter(Boolean).join('<br>'),highlight:false,isTitle:true});
  if(t1pow&&t1pow[0]>0){
    var maxPct=((1+t1pow[0]/100)*(1+t1pow[1]/100)-1)*100;
    var ringTheoryHTML='<div style="margin-top:6px;padding:8px 10px;border-radius:6px;background:#10b98111;border:1px solid #10b98144">'
      +'<div style="font-size:10px;color:#10b98188;margin-bottom:8px">リング最大威力（全条件達成時・乗算）</div>'
      +'<div style="display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap">'
      +'<div style="text-align:center"><div style="font-size:22px;font-weight:600;color:#10b981">+'+t1pow[0].toFixed(2)+'<span style="font-size:13px">%</span></div><div style="font-size:10px;color:#475569;margin-top:2px">常時</div></div>'
      +'<div style="font-size:20px;color:#334155;padding-bottom:14px">+</div>'
      +'<div style="text-align:center"><div style="font-size:22px;font-weight:600;color:#10b981">+'+t1pow[1].toFixed(2)+'<span style="font-size:13px">%</span></div><div style="font-size:10px;color:#475569;margin-top:2px">条件達成</div></div>'
      +'<div style="font-size:20px;color:#334155;padding-bottom:14px">=</div>'
      +'<div style="text-align:center;background:#10b98122;border:1px solid #10b98166;border-radius:8px;padding:4px 14px"><div style="font-size:26px;font-weight:700;color:#10b981">+'+maxPct.toFixed(2)+'<span style="font-size:14px">%</span></div><div style="font-size:10px;color:#10b98188;margin-top:2px">最大（乗算）</div></div>'
      +'</div><div style="font-size:10px;color:#475569;margin-top:6px;text-align:center">×'+(1+t1pow[0]/100).toFixed(4)+' × '+(1+t1pow[1]/100).toFixed(4)+'　打撃・射撃・法撃すべてに適用</div></div>';
    ringLines.push({name:'',eff:ringTheoryHTML,highlight:false,isTitle:false,raw:true});
  }
  if(ringLines.length)html+=makeInfoCard('スキルリング','#10b981',ringLines);
  if(!html)return '';
  return '<div class="ref-card"><div class="ref-title">参考情報（ステータス非反映）</div><div class="ref-note">以下は計算に含まれない条件付き効果です</div>'+html+'</div>';
}

// ==================== メイン計算 ====================
function calc(){
  var results=GEAR.filter(function(g){return !g.isRing;}).map(function(g){return calcGear(g);});
  var tot={};
  ['s','r','t'].forEach(function(k){tot[k]=results.reduce(function(a,r){return a*r[k];},1);});
  ['hp','pp'].forEach(function(k){tot[k]=results.reduce(function(a,r){return a+r[k];},0);});
  var flBase=gv('weapon_fl'),flMul=1;
  GEAR.filter(function(g){return !g.isRing;}).forEach(function(g){
    for(var i=0;i<8;i++)flMul*=(1+gv(g.id+'_af'+i+'_fl')/100);
    if(g.isWeapon)for(var j=0;j<3;j++)flMul*=(1+gv(g.id+'_ex'+j+'_fl')/100);
  });
  var flFin=flBase*flMul,drTaken=results.reduce(function(a,r){return a*r.dr;},1);
  tot.dr=1-drTaken;
  _lastTot=tot;
  var srtHTML='<div class="result-atk-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px">'
    +['s','r','t'].map(function(k){
      var lbl={s:'打撃',r:'射撃',t:'法撃'}[k],col={s:'#ff6b2b',r:'#38bfff',t:'#ffe033'}[k];
      var bg={s:'#ff6b2b18',r:'#38bfff18',t:'#ffe03318'}[k],border={s:'#ff6b2b55',r:'#38bfff55',t:'#ffe03355'}[k];
      var pct=((tot[k]-1)*100).toFixed(2),has=(tot[k]-1)*100>0;
      return '<div style="background:'+bg+';border:1px solid '+border+';border-radius:10px;padding:12px 14px;text-align:center">'
        +'<div style="font-size:11px;color:'+col+'99;margin-bottom:6px;font-weight:500;letter-spacing:.06em;text-transform:uppercase">'+lbl+'</div>'
        +'<div style="font-size:28px;font-weight:700;color:'+(has?col:'#334155')+'">'+(has?'+'+pct:'—')+'<span style="font-size:14px;opacity:.8">%</span></div></div>';
    }).join('')+'</div>';
  var hpV=Math.round(tot.hp),ppV=Math.round(tot.pp);
  var hpColor=hpV>0?'#00ff88':hpV<0?'#f87171':'#334155',ppColor=ppV>0?'#00eeff':ppV<0?'#f87171':'#334155';
  var subStatsHTML='<div class="result-sub-grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:8px">'
    +'<div style="background:#00ff8818;border:1px solid #00ff8855;border-radius:10px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between">'
    +'<span style="font-size:11px;color:#00ff8899;font-weight:500">HP</span>'
    +'<span style="font-size:24px;font-weight:700;color:'+hpColor+'">'+(hpV!==0?(hpV>0?'+':'')+hpV:'—')+'</span></div>'
    +'<div style="background:#00eeff18;border:1px solid #00eeff55;border-radius:10px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between">'
    +'<span style="font-size:11px;color:#00eeff99;font-weight:500">PP</span>'
    +'<span style="font-size:24px;font-weight:700;color:'+ppColor+'">'+(ppV!==0?(ppV>0?'+':'')+ppV:'—')+'</span></div></div>';
  var flHTML=flBase>0
    ?'<div><div class="sp-label">威力下限補正（最終値）</div><div class="sp-sub">武器基本値 '+flBase.toFixed(2)+'% × 能力乗算 ×'+fmtM(flMul)+'</div></div>'
     +'<div style="text-align:right"><div class="sp-val">'+flFin.toFixed(2)+'<span class="sp-unit">%</span></div><div class="sp-sub">= '+flBase.toFixed(2)+' × '+fmtM(flMul)+'</div></div>'
    :'<div><div class="sp-label">威力下限補正（最終値）</div><div class="sp-sub" style="color:#f87171">武器が選択されていません</div></div><div style="font-size:20px;font-weight:500;color:#334155">—</div>';
  document.getElementById('result').innerHTML=
    '<div class="result-card"><div class="result-title">全装備合計（乗算結果）</div>'
    +srtHTML+subStatsHTML
    +'<div style="display:flex;flex-direction:column;gap:8px">'
    +'<div class="sp-box fl">'+flHTML+'</div>'
    +'<div class="sp-box dr"><div><div class="sp-label">ダメージ耐性（最終値）</div><div class="sp-sub">各防具・能力の乗算</div></div>'
    +'<div style="text-align:right"><div class="sp-val">'+(tot.dr*100).toFixed(2)+'<span class="sp-unit">%</span></div><div class="sp-sub">受けるダメージ割合：'+(drTaken*100).toFixed(2)+'%</div></div></div>'
    +'</div></div>'+buildRefHTML(tot.s,tot.r,tot.t)+buildDmgIndexHTML(tot);
  if(showSlotCompare)renderSlotCompare();
}

// ==================== 保存/復元 ====================
function collectState(){
  var st={bi:{},af:{},exs:{},ws:'0',wts:'0',rt1:'0',rt2:'0',rt1lv:'0',rt2lv:'0',fixa:'0',fixalv:'0',tog_sl:togSlState,tog_gear:togGearState,tog_subsl:togSubSlState};
  document.querySelectorAll('input[type="number"]').forEach(function(el){if(el.id)st.bi[el.id]=el.value;});
  GEAR.filter(function(g){return !g.isRing;}).forEach(function(g){
    for(var i=0;i<8;i++){var pid=g.id+'_af'+i;var b=document.getElementById(pid+'_btn');if(b)st.af[pid]=b.textContent;}
    if(g.isWeapon){for(var j=0;j<3;j++){var pid2='weapon_ex'+j;var b2=document.getElementById(pid2+'_btn');if(b2)st.af[pid2]=b2.textContent;var sub=document.getElementById(pid2+'_sub');if(sub)st.exs[pid2]=sub.value;}}
  });
  var ws=document.querySelector('#panel_weapon .sel-wrap select');st.ws=ws?ws.value:'0';
  var wts=document.getElementById('weapon_type_sel');st.wts=wts?wts.value:'0';
  ['armor1','armor2','armor3'].forEach(function(id){var s=document.querySelector('#panel_'+id+' .sel-wrap select');st[id+'s']=s?s.value:'0';});
  var t1=document.getElementById('ring_t1'),t2=document.getElementById('ring_t2'),t1lv=document.getElementById('ring_t1_lv'),t2lv=document.getElementById('ring_t2_lv');
  st.rt1=t1?t1.value:'0';st.rt2=t2?t2.value:'0';st.rt1lv=t1lv?t1lv.value:'0';st.rt2lv=t2lv?t2lv.value:'0';
  var fs=document.getElementById('fixa_sel'),fl=document.getElementById('fixa_lv');
  st.fixa=fs?fs.value:'0';st.fixalv=fl?fl.value:'0';
  return st;
}
function applyState(st){
  var ws=document.querySelector('#panel_weapon .sel-wrap select');if(ws){ws.value=st.ws||'0';onWpn(ws);}
  var wts=document.getElementById('weapon_type_sel');if(wts)wts.value=st.wts||'0';
  ['armor1','armor2','armor3'].forEach(function(id){var s=document.querySelector('#panel_'+id+' .sel-wrap select');if(s){s.value=st[id+'s']||'0';onAmr(s,id);}});
  Object.keys(st.bi||{}).forEach(function(id){var el=document.getElementById(id);if(el&&!el.readOnly)el.value=st.bi[id];});
  Object.keys(st.af||{}).forEach(function(pid){
    var btn=document.getElementById(pid+'_btn');if(!btn)return;btn.textContent=st.af[pid];
    var list=pid.indexOf('_ex')!==-1?EX_PRESETS:PRESETS,p=list.find(function(x){return x.n===st.af[pid];});
    if(p&&!p.cat&&!p.subcat)ALL_STATS.forEach(function(s){var el=document.getElementById(pid+'_'+s.k);if(el)el.value=p[s.k]||0;});
  });
  Object.keys(st.exs||{}).forEach(function(pid){
    var sub=document.getElementById(pid+'_sub');if(!sub)return;sub.value=st.exs[pid]||'0';
    if(!isExA(getN(pid))&&parseInt(sub.value)!==0){var s=EX_SUB[parseInt(sub.value)];if(s)['hp','pp','dr','td'].forEach(function(k){var el=document.getElementById(pid+'_'+k);if(el)el.value=s[k]||0;});}
  });
  if(st.rt1!==undefined){var t1=document.getElementById('ring_t1');if(t1)t1.value=st.rt1;}
  if(st.rt2!==undefined){var t2=document.getElementById('ring_t2');if(t2)t2.value=st.rt2;}
  if(st.rt1lv!==undefined){var t1lv=document.getElementById('ring_t1_lv');if(t1lv)t1lv.value=st.rt1lv;}
  if(st.rt2lv!==undefined){var t2lv=document.getElementById('ring_t2_lv');if(t2lv)t2lv.value=st.rt2lv;}
  if(st.fixa!==undefined){var fs2=document.getElementById('fixa_sel');if(fs2)fs2.value=st.fixa;}
  if(st.fixalv!==undefined){var fl2=document.getElementById('fixa_lv');if(fl2)fl2.value=st.fixalv;}
  if(st.tog_sl!==undefined)togSlState=!!st.tog_sl;
  if(st.tog_gear!==undefined)togGearState=parseInt(st.tog_gear)||0;
  if(st.tog_subsl!==undefined)togSubSlState=!!st.tog_subsl;
  GEAR.filter(function(g){return !g.isRing;}).forEach(function(g){updDupe(g.id);if(g.isWeapon){chkLim();updExDupe();chkExSub();}});
  calc();
}
function resetState(){
  document.querySelectorAll('input[type="number"]').forEach(function(el){if(!el.readOnly)el.value=0;});
  document.querySelectorAll('.dd-btn').forEach(function(btn){btn.textContent='（なし）';});
  document.querySelectorAll('.affix-tbl.ex-tbl select').forEach(function(sel){sel.value='0';});
  document.querySelectorAll('.sel-wrap select').forEach(function(sel){sel.value='0';});
  ['ring_t1','ring_t2','ring_t1_lv','ring_t2_lv','weapon_type_sel'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='0';});
  var flEl=document.getElementById('weapon_fl');if(flEl)flEl.value=0;
  var lbl=document.getElementById('weapon_fl_label');if(lbl)lbl.textContent='—';
  togSlState=false;togGearState=0;togSubSlState=false;
  GEAR_SORTS={};
  GEAR.filter(function(g){return !g.isRing;}).forEach(function(g){updDupe(g.id);if(g.isWeapon){chkLim();updExDupe();chkExSub();}});
  calc();
}
window.addEventListener('scroll',function(){var btn=document.getElementById('back_top');if(btn)btn.style.display=window.scrollY>200?'block':'none';});

// ==================== データ読込＆初期化 ====================
var DATA_BASE='data/';
function loadData(){
  var loadEl=document.getElementById('load_status');
  if(loadEl)loadEl.style.display='block';
  Promise.all([
    fetch(DATA_BASE+'weapons.json').then(function(r){if(!r.ok)throw new Error('weapons.json');return r.json();}),
    fetch(DATA_BASE+'armors.json').then(function(r){if(!r.ok)throw new Error('armors.json');return r.json();}),
    fetch(DATA_BASE+'rings.json').then(function(r){if(!r.ok)throw new Error('rings.json');return r.json();}),
    fetch(DATA_BASE+'affixes.json').then(function(r){if(!r.ok)throw new Error('affixes.json');return r.json();}),
    fetch(DATA_BASE+'ex_affixes.json').then(function(r){if(!r.ok)throw new Error('ex_affixes.json');return r.json();}),
    fetch(DATA_BASE+'weapon_types.json').then(function(r){if(!r.ok)throw new Error('weapon_types.json');return r.json();})
  ]).then(function(results){
    WEAPONS=results[0];
    ARMORS=results[1];
    RING_TYPE1=results[2].type1;
    RING_TYPE2=results[2].type2;
    PRESETS=results[3];
    EX_PRESETS=results[4];
    WEAPON_TYPES=results[5];
    if(loadEl)loadEl.style.display='none';
    initApp();
  }).catch(function(err){
    if(loadEl){loadEl.style.display='block';loadEl.style.color='#f87171';loadEl.textContent='データの読み込みに失敗しました（'+err.message+'）。data/フォルダの配置とファイル名を確認してください。';}
    console.error('データ読み込みエラー:',err);
  });
}
loadData();
</script>
